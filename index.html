<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0d0d10;--bg2:#17171c;--bg3:#222229;--bg4:#2e2e36;
  --conv:#b07cff;--son:#00c9a7;--video:#5b8def;--light:#f0a500;--elec:#e24b4a;--net:#22d3ee;--conn:#ff7ab0;--rig:#a3e635;
  --text:#edeef2;--text2:#9a9aac;--text3:#5c5c6a;
  --border:#2a2a36;--ok:#00c9a7;--warn:#f0a500;--danger:#e24b4a;
  --font:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;--mono:'SF Mono',Menlo,monospace
}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100%;overscroll-behavior-y:none}
body{max-width:560px;margin:0 auto;padding-bottom:30px}
#app{min-height:100vh}
svg.ti{width:1em;height:1em;display:inline-block;vertical-align:-0.14em;flex-shrink:0;stroke:currentColor}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:20;background:rgba(13,13,16,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;padding:14px 16px;min-height:58px}
.topbar .back{width:38px;height:38px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text);font-size:20px;cursor:pointer;flex-shrink:0}
.topbar .back:active{background:var(--bg4)}
.topbar .ttl{font-size:17px;font-weight:600;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.topbar .ttl small{display:block;font-size:12px;font-weight:400;color:var(--text3);margin-top:1px}
.brand{display:flex;align-items:center;gap:9px}
.brand .logo{font-size:20px}
.brand-txt{font-size:17px;font-weight:700;letter-spacing:.02em;line-height:1.25}
.brand-txt span{font-weight:400;color:var(--text3);font-size:11.5px;display:block;letter-spacing:.01em;margin-top:1px}

/* HOME */
.home-wrap{padding:16px}
.search{position:relative;margin-bottom:20px}
.search i,.search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:18px}
.search input{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:16px;padding:13px 14px 13px 42px;outline:none;font-family:var(--font)}
.search input:focus{border-color:var(--son)}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.cat-tile{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:18px 16px;cursor:pointer;transition:transform .08s,border-color .15s;position:relative;overflow:hidden;min-height:118px;display:flex;flex-direction:column;justify-content:space-between}
.cat-tile:active{transform:scale(.97)}
.cat-tile .ic{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:10px}
.cat-tile .nm{font-size:15px;font-weight:600;letter-spacing:.02em}
.cat-tile .ct{font-size:12px;color:var(--text3);margin-top:2px}
.cat-tile .glow{position:absolute;top:-30px;right:-30px;width:90px;height:90px;border-radius:50%;opacity:.13;filter:blur(8px)}

/* LIST */
.list-wrap{padding:8px 16px 16px}
.list-row{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:13px;padding:15px 16px;margin-bottom:10px;cursor:pointer;transition:transform .08s,border-color .15s}
.list-row:active{transform:scale(.985);border-color:var(--text3)}
.list-row .ic{width:38px;height:38px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;background:var(--bg3)}
.list-row .tx{flex:1;min-width:0}
.list-row .tx .a{font-size:15px;font-weight:500}
.list-row .tx .b{font-size:12.5px;color:var(--text3);margin-top:2px;line-height:1.3}
.list-row .chev{color:var(--text3);font-size:18px;flex-shrink:0}
.sect-label{font-size:12px;color:var(--text3);text-transform:uppercase;letter-spacing:.1em;margin:18px 4px 10px;font-weight:600}
.empty{text-align:center;color:var(--text3);padding:40px 20px;font-size:14px}

/* TOOL */
.tool-wrap{padding:18px 16px}
.field{margin-bottom:14px}
.field>label{display:block;font-size:13px;color:var(--text2);margin-bottom:7px;font-weight:500}
.field input,.field select{width:100%;background:var(--bg2);border:1px solid var(--border);border-radius:11px;color:var(--text);font-size:16px;padding:13px 14px;outline:none;font-family:var(--font);transition:border-color .15s}
.field input:focus,.field select:focus{border-color:var(--c)}
.field select{appearance:none;background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%235c5c6a' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");background-repeat:no-repeat;background-position:right 12px center;padding-right:40px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.result{background:linear-gradient(135deg,var(--bg2),var(--bg3));border:1px solid var(--border);border-radius:14px;padding:16px;margin-top:6px}
.result-label{font-size:12px;color:var(--text3);margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
.result-value{font-size:30px;font-weight:600;font-variant-numeric:tabular-nums;color:var(--c);line-height:1.1}
.result-sub{font-size:13px;color:var(--text2);margin-top:7px;line-height:1.5}
.formula{font-size:12px;color:var(--text3);font-family:var(--mono);background:var(--bg3);padding:7px 11px;border-radius:8px;margin-top:14px;display:block;text-align:center}
.note{font-size:13px;color:var(--text2);margin-top:14px;line-height:1.6;background:var(--bg2);padding:13px 15px;border-radius:11px;border-left:3px solid var(--c)}
.gen-btn{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:12px;color:var(--text);font-size:15px;padding:15px;cursor:pointer;transition:.12s;font-weight:600;display:flex;align-items:center;justify-content:center;gap:9px;margin-top:6px}
.gen-btn:active{transform:scale(.98)}
.gen-btn.on{background:var(--c);color:#0d0d10;border-color:var(--c)}
.sub-h{font-size:13px;color:var(--c);font-weight:600;margin:24px 0 12px;letter-spacing:.03em;display:flex;align-items:center;gap:7px}
.sub-h:first-child{margin-top:0}
input[type=range]{width:100%;accent-color:var(--c);height:30px}
.rng-lab{display:flex;justify-content:space-between;font-size:13px;color:var(--text2);margin-bottom:4px;font-weight:500}
.rng-lab b{color:var(--c);font-variant-numeric:tabular-nums}
.ref-tbl{background:var(--bg2);border:1px solid var(--border);border-radius:13px;overflow:hidden}
.ref-tbl .r{display:flex;justify-content:space-between;padding:13px 15px;font-size:14px;border-bottom:1px solid var(--border)}
.ref-tbl .r:last-child{border-bottom:none}
.ref-tbl .k{color:var(--text)}.ref-tbl .v{color:var(--text2);text-align:right}
.ref-tbl .v.hl{color:var(--c);font-weight:500}
.dips{display:flex;gap:5px;justify-content:center;background:#0a0a0d;padding:16px 10px;border-radius:12px;border:1px solid var(--border);flex-wrap:wrap}
.dip{width:28px;text-align:center}
.dip-track{background:#141418;border:1px solid #333;border-radius:5px;height:50px;position:relative;margin-bottom:5px}
.dip-knob{position:absolute;left:3px;right:3px;height:21px;border-radius:3px;transition:top .12s,background .12s}
.dip.on .dip-knob{top:3px;background:var(--light)}
.dip.off .dip-knob{top:26px;background:#4a4a52}
.dip-num{font-size:10px;color:var(--text3)}
.dip-val{font-size:9px;color:var(--text3);font-family:var(--mono)}
.pin-tbl{width:100%;border-collapse:collapse;font-size:14px;background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.pin-tbl tr{border-bottom:1px solid var(--border)}
.pin-tbl tr:last-child{border-bottom:none}
.pin-tbl td{padding:12px 14px}
.pin-tbl td:first-child{color:var(--c);font-family:var(--mono);width:115px;font-weight:500}
.wmap{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:14px;font-family:var(--mono);font-size:14px;line-height:2.3}
.wmap .a{color:var(--conn)}.wmap .b{color:var(--son)}.wmap .ar{color:var(--text3);padding:0 8px}
.wmap .cm{color:var(--text3);font-family:var(--font);font-size:11px;display:block;margin-left:2px;margin-top:-4px;margin-bottom:6px}

.topbar .favb{width:38px;height:38px;border-radius:10px;background:var(--bg3);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:19px;cursor:pointer;flex-shrink:0}
.topbar .favb.on{color:var(--light);border-color:var(--light)}
.topbar .favb.on svg{fill:currentColor}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--bg4);color:var(--text);border:1px solid var(--border);padding:10px 18px;border-radius:24px;font-size:13.5px;font-weight:500;opacity:0;pointer-events:none;transition:.25s;z-index:99;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.result-value{cursor:pointer}
.dip{cursor:pointer}
.dip:active .dip-track{border-color:var(--light)}
</style>
</head>

 body:'<div class="field"><label>Type</label><select id="rc_mode" onchange="cREC()"><option value="a" selected>Audio multipiste</option><option value="v">Vid\u00e9o</option></select></div><div id="rc_audio"><div class="row2"><div class="field"><label>Nombre de pistes</label><input type="number" '+NUM+' id="rc_ch" value="32" min="1" oninput="cREC()"></div><div class="field"><label>Dur\u00e9e (h)</label><input type="number" '+NUM+' id="rc_h" value="4" step="0.5" oninput="cREC()"></div></div><div class="row2"><div class="field"><label>Sample rate</label><select id="rc_sr" onchange="cREC()"><option value="44100">44.1 kHz</option><option value="48000" selected>48 kHz</option><option value="96000">96 kHz</option></select></div><div class="field"><label>R\u00e9solution</label><select id="rc_bd" onchange="cREC()"><option value="16">16 bits</option><option value="24" selected>24 bits</option><option value="32">32 bits float</option></select></div></div></div><div id="rc_video" style="display:none"><div class="field"><label>Codec / d\u00e9bit</label><select id="rc_codec" onchange="cREC()"><option value="25">H.264 \u00e9v\u00e9nementiel \u2014 25 Mbps</option><option value="50" selected>H.264 / XAVC \u2014 50 Mbps</option><option value="100">H.265 4K / XAVC-I lite \u2014 100 Mbps</option><option value="147">ProRes 422 1080p25 \u2014 147 Mbps</option><option value="184">ProRes 422 HQ 1080p25 \u2014 184 Mbps</option><option value="737">ProRes 422 HQ 2160p25 \u2014 737 Mbps</option><option value="0">D\u00e9bit personnalis\u00e9\u2026</option></select></div><div class="row2"><div class="field"><label>D\u00e9bit (Mbps)</label><input type="number" '+NUM+' id="rc_br" value="50" oninput="cREC()"></div><div class="field"><label>Dur\u00e9e (h)</label><input type="number" '+NUM+' id="rc_vh" value="4" step="0.5" oninput="cREC()"></div></div></div><div class="result"><div class="result-label">Espace n\u00e9cessaire</div><div class="result-value" id="rc_out">\u2014</div><div class="result-sub" id="rc_sub"></div></div><div class="note">Pr\u00e9vois 15\u201320 % de marge sur le support et v\u00e9rifie sa vitesse d\u2019\u00e9criture soutenue. Audio : WAV/BWF non compress\u00e9.</div>',init:'cREC'},

/* ---- SON ---- */
{id:'gen',cat:'son',icon:'ti-broadcast',title:'G\u00e9n\u00e9rateurs',sub:'Sinus, bruit rose & blanc',
 body:'<div class="sub-h"><i class="ti ti-wave-sine"></i> Sinus</div><div class="field"><div class="rng-lab"><span>Fr\u00e9quence</span><b id="sg_flab">1000 Hz</b></div><input type="range" id="sg_f" min="20" max="20000" value="1000" oninput="sgUpd()"></div><div class="field"><div class="rng-lab"><span>Niveau</span><b id="sg_vlab">-20 dB</b></div><input type="range" id="sg_v" min="-60" max="0" value="-20" oninput="sgUpd()"></div><button class="gen-btn" id="sg_btn" onclick="toggleSine()"><i class="ti ti-player-play"></i> Lancer sinus</button><div class="sub-h"><i class="ti ti-wind"></i> Bruit</div><div class="field"><label>Type</label><select id="ng_type"><option value="pink">Bruit rose</option><option value="white">Bruit blanc</option></select></div><div class="field"><div class="rng-lab"><span>Niveau</span><b id="ng_vlab">-20 dB</b></div><input type="range" id="ng_v" min="-60" max="0" value="-20" oninput="ngUpd()"></div><button class="gen-btn" id="ng_btn" onclick="toggleNoise()"><i class="ti ti-player-play"></i> Lancer bruit</button><div class="note">\u26a0 Baisse ton volume avant de lancer. Prudence sur les hautes fr\u00e9quences et le bruit blanc (oreilles + tweeters).</div>',init:'genInit'},
{id:'al',cat:'son',icon:'ti-clock-bolt',title:'Delay alignement HP',sub:'Rappel / front-fill + Haas',
 body:'<div class="field"><label>Distance principale \u2192 rappel (m)</label><input type="number" '+NUM+' id="al_d" value="20" step="0.5" oninput="cAL()"></div><div class="row2"><div class="field"><label>Temp. (\u00b0C)</label><input type="number" '+NUM+' id="al_t" value="20" oninput="cAL()"></div><div class="field"><label>Offset Haas (ms)</label><input type="number" '+NUM+' id="al_h" value="10" step="1" oninput="cAL()"></div></div><div class="result"><div class="result-label">Delay sur le rappel</div><div class="result-value" id="al_out">\u2014</div><div class="result-sub" id="al_sub"></div></div><span class="formula">t = d/v + offset Haas</span>',init:'cAL'},
{id:'lv',cat:'son',icon:'ti-adjustments-alt',title:'Niveaux dBu / dBV / V',sub:'Conversion bidirectionnelle',
 body:'<div class="field"><label>Unit\u00e9 d\'entr\u00e9e</label><select id="lv_unit" onchange="cLV()"><option value="dbu">dBu</option><option value="dbv">dBV</option><option value="v">Volts RMS</option></select></div><div class="field"><label id="lv_lab">Valeur (dBu)</label><input type="number" '+NUM+' id="lv_in" value="4" step="0.1" oninput="cLV()"></div><div class="result"><div class="result-label">\u00c9quivalences</div><div class="result-value" id="lv_main">\u2014</div><div class="result-sub" id="lv_sub"></div></div><span class="formula">0 dBu = 0.7746 V \u00b7 0 dBV = 1 V</span>',init:'cLV'},
{id:'fs',cat:'son',icon:'ti-arrow-bar-to-down',title:'dBFS \u2192 Analogique',sub:'Selon la r\u00e9f\u00e9rence',
 body:'<div class="field"><label>Niveau (dBFS)</label><input type="number" '+NUM+' id="fs_in" value="-18" oninput="cFS()"></div><div class="field"><label>R\u00e9f\u00e9rence 0 dBFS</label><select id="fs_ref" onchange="cFS()"><option value="24">+24 dBu (broadcast)</option><option value="22" selected>+22 dBu (live)</option><option value="20">+20 dBu (EBU R68)</option><option value="18">+18 dBu (DAW)</option></select></div><div class="result"><div class="result-label">Niveau analogique</div><div class="result-value" id="fs_out">\u2014</div><div class="result-sub" id="fs_note"></div></div>',init:'cFS'},
{id:'spl',cat:'son',icon:'ti-volume',title:'SPL \u2014 distance',sub:'Loi inverse du carr\u00e9',
 body:'<div class="field"><label>SPL r\u00e9f\u00e9rence (dB)</label><input type="number" '+NUM+' id="spl_v" value="100" oninput="cSPL()"></div><div class="row2"><div class="field"><label>d1 (m)</label><input type="number" '+NUM+' id="spl_d1" value="1" step="0.5" oninput="cSPL()"></div><div class="field"><label>d2 (m)</label><input type="number" '+NUM+' id="spl_d2" value="10" step="0.5" oninput="cSPL()"></div></div><div class="result"><div class="result-label">SPL \u00e0 d2</div><div class="result-value" id="spl_out">\u2014</div><div class="result-sub" id="spl_sub"></div></div><span class="formula">SPL2 = SPL1 - 20\u00b7log10(d2/d1)</span>',init:'cSPL'},
{id:'src',cat:'son',icon:'ti-stack-2',title:'Cumul de sources',sub:'N sources identiques',
 body:'<div class="row2"><div class="field"><label>Nombre</label><input type="number" '+NUM+' id="src_n" value="4" min="1" oninput="cSRC()"></div><div class="field"><label>SPL / source</label><input type="number" '+NUM+' id="src_s" value="95" oninput="cSRC()"></div></div><div class="result"><div class="result-label">SPL combin\u00e9</div><div class="result-value" id="src_out">\u2014</div><div class="result-sub" id="src_sub"></div></div><span class="formula">SPL + 10\u00b7log10(N)</span>',init:'cSRC'},
{id:'hp',cat:'son',icon:'ti-speakerphone',title:'Association HP',sub:'Imp\u00e9dance s\u00e9rie/parall\u00e8le',
 body:'<div class="row2"><div class="field"><label>Z par HP (\u03a9)</label><input type="number" '+NUM+' id="hp_z" value="8" oninput="cHP()"></div><div class="field"><label>Nombre</label><input type="number" '+NUM+' id="hp_n" value="4" min="1" oninput="cHP()"></div></div><div class="field"><label>C\u00e2blage</label><select id="hp_m" onchange="cHP()"><option value="s">S\u00e9rie</option><option value="p" selected>Parall\u00e8le</option><option value="sp">S\u00e9rie-parall\u00e8le</option></select></div><div class="result"><div class="result-label">Imp\u00e9dance totale</div><div class="result-value" id="hp_out">\u2014</div><div class="result-sub" id="hp_note"></div></div>',init:'cHP'},
{id:'lw',cat:'son',icon:'ti-ripple',title:'Longueur d\'onde',sub:'\u03bb, \u03bb/2, \u03bb/4',
 body:'<div class="field"><label>Fr\u00e9quence (Hz)</label><input type="number" '+NUM+' id="lw_f" value="1000" oninput="cLW()"></div><div class="result"><div class="result-label">\u03bb (343 m/s)</div><div class="result-value" id="lw_out">\u2014</div><div class="result-sub" id="lw_sub"></div></div><span class="formula">\u03bb = c / f</span>',init:'cLW'},

{id:'cmb',cat:'son',icon:'ti-arrows-diff',title:'Filtrage en peigne',sub:'\u00c9cart de trajet \u2192 nuls',
 body:'<div class="field"><label>Diff\u00e9rence de trajet entre 2 sources (m)</label><input type="number" '+NUM+' id="cmb_dd" value="0.3" step="0.05" oninput="cCOMB()"></div><div class="field"><label>Temp. (\u00b0C)</label><input type="number" '+NUM+' id="cmb_t" value="20" oninput="cCOMB()"></div><div class="result"><div class="result-label">1\u02b3 fr\u00e9quence annul\u00e9e</div><div class="result-value" id="cmb_out">\u2014</div><div class="result-sub" id="cmb_sub"></div></div><div class="note">Utile pour la r\u00e8gle des 3:1 sur les micros et l\'addition de sources. Plus l\'\u00e9cart est grand, plus le 1\u02b3 creux descend bas.</div>',init:'cCOMB'},
{id:'amp',cat:'son',icon:'ti-device-speaker',title:'Puissance ampli / HP',sub:'Marge de headroom',
 body:'<div class="field"><label>Puissance programme du HP (W)</label><input type="number" '+NUM+' id="amp_w" value="500" oninput="cAMP()"></div><div class="field"><label>Marge</label><select id="amp_h" onchange="cAMP()"><option value="1.5">\u00d71.5 (s\u00e9curis\u00e9)</option><option value="2" selected>\u00d72 (recommand\u00e9)</option><option value="2.5">\u00d72.5 (gros transitoires)</option></select></div><div class="result"><div class="result-label">Puissance ampli conseill\u00e9e</div><div class="result-value" id="amp_out">\u2014</div><div class="result-sub" id="amp_sub"></div></div><div class="note">R\u00e8gle courante : ampli dimensionn\u00e9 \u00e0 ~2\u00d7 la puissance programme du HP pour garder du headroom sans clipper (le clipping tue les tweeters).</div>',init:'cAMP'},
{id:'rt60',cat:'son',icon:'ti-building-arch',title:'RT60 (Sabine)',sub:'Temps de r\u00e9verb\u00e9ration',
 body:'<div class="field"><label>Volume du local (m\u00b3)</label><input type="number" '+NUM+' id="rt_v" value="1000" oninput="cRT60()"></div><div class="row2"><div class="field"><label>Surface totale (m\u00b2)</label><input type="number" '+NUM+' id="rt_s" value="600" oninput="cRT60()"></div><div class="field"><label>Absorption moy. \u03b1</label><input type="number" '+NUM+' id="rt_a" value="0.2" step="0.05" min="0.01" max="1" oninput="cRT60()"></div></div><div class="result"><div class="result-label">RT60 estim\u00e9</div><div class="result-value" id="rt_out">\u2014</div><div class="result-sub" id="rt_sub"></div></div><span class="formula">RT60 = 0.161 \u00d7 V / (S\u00b7\u03b1)</span>',init:'cRT60'},

{id:'reg',cat:'son',icon:'ti-gauge',title:'R\u00e9glementation & dose',sub:'D\u00e9cret son FR + exposition',
 body:'<div class="field"><label>Niveau moyen LAeq (dB(A))</label><input type="number" '+NUM+' id="reg_l" value="98" oninput="cREG()"></div><div class="result"><div class="result-label">Dur\u00e9e max d\u2019exposition (crit\u00e8re travail, 85 dB(A)/8h, +3 dB = temps /2)</div><div class="result-value" id="reg_out">\u2014</div><div class="result-sub" id="reg_sub"></div></div><div class="sub-h">D\u00e9cret 2017-1244 (lieux diffusant de la musique amplifi\u00e9e)</div><div class="ref-tbl"><div class="r"><span class="k">Public g\u00e9n\u00e9ral</span><span class="v hl">102 dB(A) / 15 min</span></div><div class="r"><span class="k">Basses fr\u00e9quences</span><span class="v hl">118 dB(C) / 15 min</span></div><div class="r"><span class="k">Spectacles jeune public (\u2264 6 ans)</span><span class="v">94 dB(A) / 15 min</span></div><div class="r"><span class="k">Obligations</span><span class="v">affichage, enregistrement, zones de repos, protections</span></div></div><div class="note">La dose ci-dessus est le crit\u00e8re sant\u00e9 travailleur (code du travail). Le d\u00e9cret public s\u2019applique en LAeq/LCeq 15 min glissantes. V\u00e9rifie l\u2019arr\u00eat\u00e9 et la jauge de ton lieu.</div>',init:'cREG'},
{id:'card',cat:'son',icon:'ti-boxes',title:'Subs cardio / end-fire',sub:'Delay + polarit\u00e9',
 body:'<div class="field"><label>Configuration</label><select id="cd_mode" onchange="cCARD()"><option value="grad">Cardio\u00efde gradient (sub retourn\u00e9)</option><option value="end">End-fire (subs en ligne)</option></select></div><div class="row2"><div class="field"><label>Espacement (m)</label><input type="number" '+NUM+' id="cd_d" value="1" step="0.05" oninput="cCARD()"></div><div class="field"><label>Temp. (\u00b0C)</label><input type="number" '+NUM+' id="cd_t" value="20" oninput="cCARD()"></div></div><div class="result"><div class="result-label" id="cd_rlab">Delay sur le sub arri\u00e8re</div><div class="result-value" id="cd_out">\u2014</div><div class="result-sub" id="cd_sub"></div></div><div class="note" id="cd_note"></div>',init:'cCARD'},
{id:'lim',cat:'son',icon:'ti-shield-bolt',title:'Seuil de limiteur',sub:'Prot\u00e9ger le HP',
 body:'<div class="row2"><div class="field"><label>Puissance HP (W AES/RMS)</label><input type="number" '+NUM+' id="lm_p" value="500" oninput="cLIM()"></div><div class="field"><label>Imp\u00e9dance (\u03a9)</label><input type="number" '+NUM+' id="lm_z" value="8" oninput="cLIM()"></div></div><div class="field"><label>Gain de l\u2019ampli (dB)</label><input type="number" '+NUM+' id="lm_g" value="32" step="0.1" oninput="cLIM()"></div><div class="result"><div class="result-label">Seuil limiteur RMS (entr\u00e9e ampli)</div><div class="result-value" id="lm_out">\u2014</div><div class="result-sub" id="lm_sub"></div></div><div class="note">Bas\u00e9 sur la tension max du HP : V = \u221a(P\u00d7Z). Le gain ampli est sur sa fiche technique (souvent 26 \u00e0 44 dB). Pour un limiteur cr\u00eate, ajoute ~+6 dB au-dessus du RMS.</div>',init:'cLIM'},
{id:'pad',cat:'son',icon:'ti-pad2',title:'Pad att\u00e9nuateur (H)',sub:'Valeurs de r\u00e9sistances',
 body:'<div class="row2"><div class="field"><label>Att\u00e9nuation (dB)</label><input type="number" '+NUM+' id="pd_a" value="20" oninput="cPAD()"></div><div class="field"><label>Imp\u00e9dance Z (\u03a9)</label><input type="number" '+NUM+' id="pd_z" value="600" oninput="cPAD()"></div></div><div class="result"><div class="result-label">Pad en H sym\u00e9trique (Zin = Zout)</div><div class="result-value" id="pd_out">\u2014</div><div class="result-sub" id="pd_sub"></div></div><div class="note">Pad en H : 4 r\u00e9sistances s\u00e9rie identiques (2 par jambe) + 1 shunt entre les jambes. Prendre les valeurs E24 les plus proches, r\u00e9sistances \u00e0 couche m\u00e9tallique.</div>',init:'cPAD'},
{id:'hf',cat:'son',icon:'ti-antenna',title:'Fr\u00e9quences HF France',sub:'Bandes micros sans fil',
 body:'<div class="ref-tbl"><div class="r"><span class="k">470 \u2013 694 MHz (UHF TV)</span><span class="v hl">autoris\u00e9, selon TNT locale</span></div><div class="r"><span class="k">823 \u2013 832 MHz (duplex gap)</span><span class="v">autoris\u00e9</span></div><div class="r"><span class="k">863 \u2013 865 MHz</span><span class="v">libre, tr\u00e8s encombr\u00e9</span></div><div class="r"><span class="k">1785 \u2013 1805 MHz (1G8)</span><span class="v">autoris\u00e9</span></div><div class="r"><span class="k">2.4 GHz num\u00e9rique</span><span class="v">libre, wifi partout</span></div></div><div class="sub-h">Bonnes pratiques</div><div class="ref-tbl"><div class="r"><span class="k">\u00c9cart mini entre porteuses</span><span class="v">\u2265 300\u2013400 kHz</span></div><div class="r"><span class="k">Intermodulations</span><span class="v">calcul auto (Speed RF, RF Shot)</span></div><div class="r"><span class="k">Scan sur site</span><span class="v">toujours avant patch HF</span></div></div><div class="note">Scanne toujours sur site et coordonne tes fr\u00e9quences avec Speed RF ou RF Shot (canaux TV locaux, intermodulations). Les grandes manifestations peuvent n\u00e9cessiter une demande temporaire ANFR.</div>',init:'noop'},
/* ---- VIDEO ---- */
{id:'vp',cat:'video',icon:'ti-device-projector',title:'Vid\u00e9oprojecteur',sub:'Focale, distance, taille image',
 body:'<div class="field"><label>Pr\u00e9r\u00e9glage optique</label><select id="vp_preset" onchange="vpPreset()"><option value="">\u2014 personnalis\u00e9 \u2014</option><option value="0.25">Ultra court throw (~0.25)</option><option value="0.4">Tr\u00e8s court (~0.4)</option><option value="0.65">Court (~0.65)</option><option value="0.8">Court-standard (~0.8)</option><option value="1.5">Standard fixe (~1.5)</option><option value="1.8">Standard zoom (~1.8)</option><option value="2.5">Long (~2.5)</option><option value="4">Tr\u00e8s long (~4)</option><option value="6.5">Zoom longue port\u00e9e (~6.5)</option></select></div><div class="field"><label>Rapport de projection (throw ratio)</label><input type="number" '+NUM+' id="vp_tr" value="1.5" step="0.01" oninput="cVP()"></div><div class="field"><label>Calculer \u00e0 partir de</label><select id="vp_mode" onchange="cVP()"><option value="dist">Distance de recul</option><option value="width">Largeur d\'image</option></select></div><div class="row2"><div class="field"><label id="vp_inlab">Distance (m)</label><input type="number" '+NUM+' id="vp_in" value="6" step="0.1" oninput="cVP()"></div><div class="field"><label>Ratio image</label><select id="vp_ar" onchange="cVP()"><option value="1.7778" selected>16:9</option><option value="1.6">16:10</option><option value="1.3333">4:3</option><option value="2.35">2.35:1</option></select></div></div><div class="result"><div class="result-label" id="vp_rlab">Largeur d\'image</div><div class="result-value" id="vp_out">\u2014</div><div class="result-sub" id="vp_sub"></div></div><div class="note">Les pr\u00e9r\u00e9glages sont indicatifs par type d\'optique. La valeur exacte du throw ratio est imprim\u00e9e sur l\'optique ou sa fiche \u2014 saisis-la pour un calcul pr\u00e9cis.</div>',init:'cVP'},
{id:'ar',cat:'video',icon:'ti-aspect-ratio',title:'Ratio d\'aspect',sub:'Simplification + d\u00e9cimal',
 body:'<div class="row2"><div class="field"><label>Largeur (px)</label><input type="number" '+NUM+' id="ar_w" value="1920" oninput="cAR()"></div><div class="field"><label>Hauteur (px)</label><input type="number" '+NUM+' id="ar_h" value="1080" oninput="cAR()"></div></div><div class="result"><div class="result-label">Ratio</div><div class="result-value" id="ar_out">\u2014</div><div class="result-sub" id="ar_sub"></div></div><div class="sub-h">Dimensions en m\u00e8tres</div><div class="field"><label>Ratio</label><select id="ar_ratio" onchange="cARM(\'r\')"><option value="1.77778" selected>16:9</option><option value="1.6">16:10</option><option value="1.33333">4:3</option><option value="2.35294">2.35:1 (cin\u00e9ma)</option><option value="2.33333">21:9</option><option value="1">1:1 (carr\u00e9)</option><option value="px">= ratio pixels ci-dessus</option></select></div><div class="row2"><div class="field"><label>Largeur (m)</label><input type="number" '+NUM+' id="ar_mw" value="3.56" step="0.01" oninput="cARM(\'w\')"></div><div class="field"><label>Hauteur (m)</label><input type="number" '+NUM+' id="ar_mh" value="2" step="0.01" oninput="cARM(\'h\')"></div></div><div class="result"><div class="result-label">Surface</div><div class="result-value" id="ar_mout">\u2014</div><div class="result-sub" id="ar_msub"></div></div><div class="note">Renseigne une seule dimension : l\u2019autre se compl\u00e8te automatiquement selon le ratio choisi. Ex. 2 m de hauteur en 16:9 \u2192 3,56 m de largeur.</div>',init:'arInit'},
{id:'tcd',cat:'video',icon:'ti-clock',title:'Timecode \u2194 Frames',sub:'Multi frame rate',

{id:'br',cat:'video',icon:'ti-file-digit',title:'D\u00e9bit \u2192 Taille',sub:'Estimation fichier',

{id:'sdi',cat:'video',icon:'ti-plug',title:'Standards SDI',sub:'D\u00e9bit & longueur c\u00e2ble',

{id:'led',cat:'video',icon:'ti-grid-dots',title:'Pixels mur LED',sub:'R\u00e9solution totale',

{id:'vplum',cat:'video',icon:'ti-brightness',title:'Lumens n\u00e9cessaires',sub:'Selon taille & ambiance',

{id:'ledd',cat:'video',icon:'ti-eye',title:'Pitch LED \u2194 Distance',sub:'Distance de lecture',

{id:'scr',cat:'video',icon:'ti-presentation',title:'Taille \u00e9cran vs public',sub:'Hauteur d\u2019image mini',

{id:'ds',cat:'light',icon:'ti-toggle-right',title:'Adresse DMX \u2194 Dipswitch',sub:'Visualisation des switchs',
 body:'<div class="row2"><div class="field"><label>Adresse DMX (1\u2013512)</label><input type="number" inputmode="numeric" id="ds_addr" value="1" min="1" max="512" oninput="cDS()"></div><div class="field"><label>Convention</label><select id="ds_conv" onchange="cDS()"><option value="0">Somme = adresse</option><option value="1">Somme = adr - 1</option></select></div></div><div class="dips" id="ds_dips"></div><div class="result-sub" id="ds_sub" style="text-align:center;margin-top:10px"></div><div class="note">Switch 1 = poids faible (1), switch 9 = poids fort (256). La plupart des fixtures utilisent \u00ab somme = adresse \u00bb ; certaines anciennes attendent \u00ab adresse - 1 \u00bb : v\u00e9rifie la doc.</div>',init:'cDS'},
{id:'dmx',cat:'light',icon:'ti-router',title:'DMX univers & patch',sub:'Combien d\'univers ?',
 body:'<div class="row2"><div class="field"><label>Canaux / fixture</label><input type="number" '+NUM+' id="dmx_c" value="16" min="1" oninput="cDMX()"></div><div class="field"><label>Nb fixtures</label><input type="number" '+NUM+' id="dmx_n" value="40" min="1" oninput="cDMX()"></div></div><div class="result"><div class="result-label">Univers n\u00e9cessaires</div><div class="result-value" id="dmx_out">\u2014</div><div class="result-sub" id="dmx_sub"></div></div><span class="formula">512 canaux / univers</span>',init:'cDMX'},
{id:'bm',cat:'light',icon:'ti-cone',title:'Faisceau \u2192 Diam\u00e8tre',sub:'Taille du spot au sol',
 body:'<div class="row2"><div class="field"><label>Angle (\u00b0)</label><input type="number" '+NUM+' id="bm_a" value="20" oninput="cBM()"></div><div class="field"><label>Distance (m)</label><input type="number" '+NUM+' id="bm_d" value="10" step="0.5" oninput="cBM()"></div></div><div class="result"><div class="result-label">Diam\u00e8tre du spot</div><div class="result-value" id="bm_out">\u2014</div><div class="result-sub" id="bm_sub"></div></div><span class="formula">\u00d8 = 2\u00b7d\u00b7tan(angle/2)</span>',init:'cBM'},
{id:'lx',cat:'light',icon:'ti-sun',title:'Lux \u2194 Lumens',sub:'\u00c9clairement sur surface',

{id:'lp',cat:'light',icon:'ti-plug',title:'Puissance kit lumi\u00e8re',sub:'Conso & courant',

{id:'ohm',cat:'elec',icon:'ti-circuit-resistor',title:'Loi d\'Ohm',sub:'R, V ou I',

{id:'pe',cat:'elec',icon:'ti-square-root-2',title:'Puissance \u00e9lectrique',sub:'P, V ou I',
 body:'<div class="field"><label>Calculer</label><select id="pe_c" onchange="bPE();cPE()"><option value="P">Puissance (W)</option><option value="V">Tension (V)</option><option value="I">Courant (A)</option></select></div><div class="row2" id="pe_f"></div><div class="result"><div class="result-label" id="pe_lab">Puissance</div><div class="result-value" id="pe_out">\u2014</div></div><span class="formula">P = V \u00d7 I</span>',init:'peInit'},
{id:'cur',cat:'elec',icon:'ti-activity',title:'Courant mono / tri',sub:'Avec cos \u03c6',
 body:'<div class="field"><label>Puissance (W)</label><input type="number" '+NUM+' id="cur_p" value="5000" oninput="cCUR()"></div><div class="row2"><div class="field"><label>R\u00e9seau</label><select id="cur_t" onchange="cCUR()"><option value="mono">Mono 230V</option><option value="tri">Tri 400V</option></select></div><div class="field"><label>cos \u03c6</label><input type="number" '+NUM+' id="cur_pf" value="1" step="0.05" min="0.1" max="1" oninput="cCUR()"></div></div><div class="result"><div class="result-label">Courant de ligne</div><div class="result-value" id="cur_out">\u2014</div><div class="result-sub" id="cur_sub"></div></div><span class="formula">Tri : I = P / (\u221a3\u00b7U\u00b7cos\u03c6)</span>',init:'cCUR'},
{id:'vd',cat:'elec',icon:'ti-chart-line',title:'Chute de tension',sub:'C\u00e2ble cuivre',
 body:'<div class="row2"><div class="field"><label>Courant (A)</label><input type="number" '+NUM+' id="vd_i" value="20" oninput="cVD()"></div><div class="field"><label>Longueur (m)</label><input type="number" '+NUM+' id="vd_l" value="50" oninput="cVD()"></div></div><div class="row2"><div class="field"><label>Section (mm\u00b2)</label><input type="number" '+NUM+' id="vd_s" value="2.5" step="0.5" oninput="cVD()"></div><div class="field"><label>R\u00e9seau</label><select id="vd_t" onchange="cVD()"><option value="mono">Mono 230V</option><option value="tri">Tri 400V</option></select></div></div><div class="result"><div class="result-label">Chute de tension</div><div class="result-value" id="vd_out">\u2014</div><div class="result-sub" id="vd_sub"></div></div><span class="formula">cuivre \u03c1 = 0.0225 \u03a9\u00b7mm\u00b2/m</span>',init:'cVD'},
{id:'bat',cat:'elec',icon:'ti-battery-3',title:'Autonomie batterie',sub:'Dur\u00e9e estim\u00e9e',
 body:'<div class="row2"><div class="field"><label>Capacit\u00e9 (Ah)</label><input type="number" '+NUM+' id="bat_ah" value="100" oninput="cBAT()"></div><div class="field"><label>Tension (V)</label><input type="number" '+NUM+' id="bat_v" value="12" oninput="cBAT()"></div></div><div class="field"><label>Consommation (W)</label><input type="number" '+NUM+' id="bat_w" value="200" oninput="cBAT()"></div><div class="row2"><div class="field"><label>D\u00e9charge max (%)</label><input type="number" '+NUM+' id="bat_dod" value="80" min="10" max="100" oninput="cBAT()"></div><div class="field"><label>Rendement (%)</label><input type="number" '+NUM+' id="bat_eff" value="90" min="50" max="100" oninput="cBAT()"></div></div><div class="result"><div class="result-label">Autonomie estim\u00e9e</div><div class="result-value" id="bat_out">\u2014</div><div class="result-sub" id="bat_sub"></div></div><span class="formula">h = (Ah\u00b7V\u00b7DoD\u00b7\u03b7) / W</span>',init:'cBAT'},
{id:'cb',cat:'elec',icon:'ti-shield-bolt',title:'Calibre disjoncteur',sub:'Calibre normalis\u00e9',
 body:'<div class="field"><label>Courant calcul\u00e9 (A)</label><input type="number" '+NUM+' id="cb_i" value="22" oninput="cCB()"></div><div class="result"><div class="result-label">Calibre conseill\u00e9</div><div class="result-value" id="cb_out">\u2014</div><div class="result-sub" id="cb_sub"></div></div>',init:'cCB'},
{id:'eref',cat:'elec',icon:'ti-clipboard-list',title:'Rep\u00e8res courant FR',sub:'Prises & puissances',
 body:'<div class="ref-tbl"><div class="r"><span class="k">PC 16A mono</span><span class="v">~3.5 kW</span></div><div class="r"><span class="k">P17 16A tri</span><span class="v">~11 kW</span></div><div class="r"><span class="k">P17 32A tri</span><span class="v hl">~22 kW</span></div><div class="r"><span class="k">P17 63A tri</span><span class="v">~43 kW</span></div><div class="r"><span class="k">P17 125A tri</span><span class="v">~86 kW</span></div></div>',init:'noop'},

{id:'kva',cat:'elec',icon:'ti-transform',title:'kVA \u2194 kW',sub:'Puissance apparente / active',
 body:'<div class="field"><label>cos \u03c6</label><input type="number" '+NUM+' id="kva_pf" value="0.8" step="0.05" min="0.1" max="1" oninput="cKVA(\'pf\')"></div><div class="field"><label>Puissance active (kW)</label><input type="number" '+NUM+' id="kva_kw" value="8" oninput="cKVA(\'kw\')"></div><div class="field"><label>Puissance apparente (kVA)</label><input type="number" '+NUM+' id="kva_kva" value="10" oninput="cKVA(\'kva\')"></div><span class="formula">kVA = kW / cos \u03c6</span>',init:'noop'},
{id:'gset',cat:'elec',icon:'ti-engine',title:'Groupe \u00e9lectrog\u00e8ne',sub:'Dimensionnement kVA',
 body:'<div class="field"><label>Puissance totale (kW)</label><input type="number" '+NUM+' id="gen_kw" value="15" oninput="cGEN()"></div><div class="row2"><div class="field"><label>cos \u03c6</label><input type="number" '+NUM+' id="gen_pf" value="0.8" step="0.05" min="0.1" max="1" oninput="cGEN()"></div><div class="field"><label>Marge (%)</label><input type="number" '+NUM+' id="gen_mg" value="25" oninput="cGEN()"></div></div><div class="result"><div class="result-label">Puissance apparente requise</div><div class="result-value" id="gen_out">\u2014</div><div class="result-sub" id="gen_sub"></div></div><div class="note">Pr\u00e9voir une marge (d\u00e9marrage moteurs, pointes). Pour un parc majoritairement LED/audio, cos \u03c6 plus proche de 1.</div>',init:'cGEN'},
{id:'sect',cat:'elec',icon:'ti-line-dashed',title:'Section c\u00e2ble conseill\u00e9e',sub:'D\'apr\u00e8s le courant',

{id:'fuel',cat:'elec',icon:'ti-droplet',title:'Carburant groupe',sub:'Conso & autonomie cuve',

{id:'balance',cat:'elec',icon:'ti-scale',title:'\u00c9quilibrage triphas\u00e9',sub:'R\u00e9partition L1 / L2 / L3',
 body:'<div class="field"><label>Charges mono en W, s\u00e9par\u00e9es par virgules</label><input type="text" inputmode="numeric" id="bl_in" value="3000, 2000, 1500, 1200, 800, 600" oninput="cBAL()"></div><div class="result"><div class="result-label">R\u00e9partition propos\u00e9e</div><div class="result-sub" id="bl_out" style="margin-top:0;font-size:14px;line-height:1.8"></div></div><div class="result-sub" id="bl_sub" style="margin-top:8px"></div><div class="note">Algorithme glouton : plus grosses charges d\u2019abord, chacune sur la phase la moins charg\u00e9e. Les charges triphas\u00e9es se r\u00e9partissent d\u2019elles-m\u00eames, ne les saisis pas ici.</div>',init:'cBAL'},

/* ============ ROUTER / RENDER ============ */
function dbcInit(){cDBC('dbm');}
function cDBC(src){var Z=Math.max(val('dc_z')||50,0.1),P;
if(src==='z')src='dbm';
if(src==='dbm')P=Math.pow(10,val('dc_dbm')/10)/1000;
else if(src==='dbw')P=Math.pow(10,val('dc_dbw')/10);
else if(src==='mw')P=val('dc_mw')/1000;
else if(src==='w')P=val('dc_w');
else{var V;if(src==='dbv')V=Math.pow(10,val('dc_dbv')/20);else if(src==='dbu')V=0.7746*Math.pow(10,val('dc_dbu')/20);else V=Math.pow(10,val('dc_dbuv')/20)/1e6;P=V*V/Z;}
if(!isFinite(P)||P<=0){g('dc_out').textContent='\u2014';return;}
var V2=Math.sqrt(P*Z);
function setv(id,v,d){var el=g(id);if(el&&('dc_'+src)!==id)el.value=f(v,d);}
setv('dc_dbm',10*Math.log10(P*1000),2);setv('dc_dbw',10*Math.log10(P),2);
setv('dc_mw',P*1000,P*1000<0.01?6:4);setv('dc_w',P,P<0.01?6:4);
setv('dc_dbv',20*Math.log10(V2),2);setv('dc_dbu',20*Math.log10(V2/0.7746),2);setv('dc_dbuv',20*Math.log10(V2*1e6),2);
g('dc_out').textContent=V2>=1?f(V2,4)+' V':V2>=0.001?f(V2*1000,3)+' mV':f(V2*1e6,2)+' \u00b5V';
g('dc_sub').textContent='P = '+(P>=1?f(P,3)+' W':P>=0.001?f(P*1000,3)+' mW':f(P*1e6,3)+' \u00b5W')+' sous '+Z+' \u03a9';}
function cREC(){var m=g('rc_mode').value;g('rc_audio').style.display=m==='a'?'':'none';g('rc_video').style.display=m==='v'?'':'none';var bytes,sub;
if(m==='a'){var ch=val('rc_ch'),h=val('rc_h'),sr=parseFloat(g('rc_sr').value),bd=parseFloat(g('rc_bd').value);bytes=ch*sr*(bd/8)*h*3600;sub=ch+' pistes \u00b7 '+(sr/1000)+' kHz / '+bd+' bits \u00b7 '+f(ch*sr*bd/8/1e6*3600,1)+' Mo/h par piste: '+f(sr*bd/8*3600/1e6,0)+' Mo';}
else{var sel=parseFloat(g('rc_codec').value);if(sel>0)g('rc_br').value=sel;var br=val('rc_br'),h2=val('rc_vh');bytes=br*1e6/8*h2*3600;sub=br+' Mbps \u00b7 '+f(br*1e6/8*3600/1e9,1)+' Go/h';}

function doSearch(){
  var q=norm(g('search').value.trim());
  var body=g('homebody'),res=g('searchres');
  if(!q){body.style.display='';res.innerHTML='';return;}
  body.style.display='none';
  var hits=TOOLS.filter(function(t){return norm(t.title+' '+t.sub+' '+CATS[t.cat].name+' '+(KW[t.id]||'')).indexOf(q)>=0;});
  if(!hits.length){res.innerHTML='<div class="empty">Aucun calcul trouv\u00e9</div>';return;}
  res.innerHTML=hits.map(rowHTML).join('');
  swapIcons(res);
}

function renderCat(cat){
  var c=CATS[cat];if(!c){location.hash='';return;}
  var html='<div class="topbar" style="--c:'+c.color+'"><div class="back" onclick="location.hash=\'\'"><i class="ti ti-chevron-left"></i></div><div class="ttl">'+c.name+'<small>'+toolsOf(cat).length+' calculs</small></div></div><div class="list-wrap">';
  toolsOf(cat).forEach(function(t){
    html+='<div class="list-row" onclick="location.hash=\'#tool/'+t.id+'\'" style="--c:'+c.color+'"><div class="ic" style="color:'+c.color+'"><i class="ti '+t.icon+'"></i></div><div class="tx"><div class="a">'+t.title+'</div><div class="b">'+t.sub+'</div></div><i class="ti ti-chevron-right chev"></i></div>';
  });
  html+='</div>';
  g('app').innerHTML=html;
}

function renderTool(id){
  var t=toolById(id);if(!t){location.hash='';return;}
  var c=CATS[t.cat];
  pushRecent(id);
  var html='<div class="topbar" style="--c:'+c.color+'"><div class="back" onclick="location.hash=\'#cat/'+t.cat+'\'"><i class="ti ti-chevron-left"></i></div><div class="ttl">'+t.title+'<small>'+c.name+'</small></div><div class="favb'+(isFav(id)?' on':'')+'" id="favbtn" onclick="toggleFav(\''+id+'\')"><i class="ti ti-star"></i></div></div><div class="tool-wrap" style="--c:'+c.color+'">'+t.body+'</div>';
  g('app').innerHTML=html;
  if(t.init&&window[t.init])window[t.init]();
}

/* ============ CALC FUNCTIONS ============ */
function noop(){}
function cDR(){var db=val('dr_db'),n=parseFloat(g('dr_type').value),r=Math.pow(10,db/n);g('dr_out').textContent='\u00d7 '+f(r,4);g('dr_inv').textContent='Inverse : \u00d7 '+f(1/r,4);}
function cBPM(){var b=val('bpm_in'),ms=60000/b;g('bpm_q').textContent=f(ms,1)+' ms';g('bpm_sub').textContent='Croche '+f(ms/2,1)+' \u00b7 Double '+f(ms/4,1)+' \u00b7 Triolet '+f(ms/3,1)+' \u00b7 Point\u00e9e '+f(ms*1.5,1)+' ms';}
function cPF(s){if(s==='hz'){var h=val('pf_hz');g('pf_ms').value=f(1000/h,4);}else{var m=val('pf_ms');g('pf_hz').value=f(1000/m,2);}}
